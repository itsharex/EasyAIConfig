name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: get-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `EasyAIConfig ${tag}`,
              body: [
                `## EasyAIConfig ${tag}`,
                '',
                '### 📦 下载',
                '| 平台 | 文件 |',
                '|------|------|',
                '| macOS (Apple Silicon) | `.dmg` |',
                '| macOS (Intel) | `.dmg` |',
                '| Windows | `.msi` / `.exe` |',
                '| Linux | `.deb` / `.AppImage` |',
                '',
                '### 🍎 macOS 安装说明',
                '下载 `.dmg` 后拖入 Applications，首次打开前运行：',
                '```bash',
                'sudo xattr -rd com.apple.quarantine /Applications/EasyAIConfig.app',
                '```',
                '然后正常双击打开即可。',
                '',
                '### 更新日志',
                '- 修复 Windows 下部分启动命令的路径/引号兼容问题（Codex / Claude Code / OpenClaw）。',
                '- README 增加三平台下载指引与已支持功能/Roadmap 展示，信息更直观。',
                '- OpenClaw Dashboard 的 Provider 列表改为真实配置展示，移除占位假数据。',
                '- 文档视觉更新为简约风格（含新的扁平化 Logo）。',
              ].join('\n'),
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          # Windows
          - platform: windows-latest
            args: ''
            rust_target: ''
          # Linux
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare updater endpoint
        shell: bash
        run: |
          base='${{ secrets.CF_R2_PUBLIC_BASE_URL }}'
          base="${base%/}"
          if [ -n "$base" ]; then
            echo "EASYAICONFIG_UPDATER_ENDPOINT=$base/latest.json" >> "$GITHUB_ENV"
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci || npm install


      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          EASYAICONFIG_UPDATER_ENDPOINT: ${{ env.EASYAICONFIG_UPDATER_ENDPOINT }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-r2:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [create-release, build-tauri]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_PUBLIC_BASE_URL: ${{ secrets.CF_R2_PUBLIC_BASE_URL }}
      CF_R2_ENDPOINT: https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check R2 settings
        id: r2
        shell: bash
        run: |
          missing=0
          for key in CF_R2_ACCOUNT_ID CF_R2_ACCESS_KEY_ID CF_R2_SECRET_ACCESS_KEY CF_R2_BUCKET CF_R2_PUBLIC_BASE_URL; do
            if [ -z "${!key}" ]; then
              echo "missing: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Skip R2 upload
        if: steps.r2.outputs.enabled != 'true'
        run: echo 'Cloudflare R2 secrets 未配置，跳过国内更新源同步。'

      - name: Install tools
        if: steps.r2.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y jq awscli

      - name: Download release assets
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p dist/r2
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --jq '.assets[] | [.name, .url] | @tsv' | while IFS=$'	' read -r name url; do
            echo "downloading $name"
            curl -L --fail \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "$url" \
              -o "dist/r2/$name"
          done
          ls -lah dist/r2

      - name: Rewrite latest.json for R2
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        run: |
          base="${CF_R2_PUBLIC_BASE_URL%/}"
          test -f dist/r2/latest.json
          jq --arg base "$base" '
            if .platforms then
              .platforms |= with_entries(
                if (.value.url? != null) then
                  .value.url = ($base + "/" + (.value.url | split("/") | last))
                else
                  .
                end
              )
            else . end
          ' dist/r2/latest.json > dist/r2/latest.r2.json
          mv dist/r2/latest.r2.json dist/r2/latest.json
          cat dist/r2/latest.json

      - name: Upload assets to R2
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          base="${CF_R2_PUBLIC_BASE_URL%/}"
          aws s3 sync dist/r2 "s3://${CF_R2_BUCKET}/" \
            --endpoint-url "${CF_R2_ENDPOINT}" \
            --delete
          aws s3 cp dist/r2/latest.json "s3://${CF_R2_BUCKET}/latest.json" \
            --endpoint-url "${CF_R2_ENDPOINT}" \
            --cache-control 'no-store, no-cache, must-revalidate, max-age=0' \
            --content-type 'application/json'
          echo "R2 updater endpoint: $base/latest.json"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri, publish-r2]
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
