name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: get-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `EasyAIConfig ${tag}`,
              body: [
                `## EasyAIConfig ${tag}`,
                '',
                '### 📦 下载',
                '| 平台 | 文件 |',
                '|------|------|',
                '| macOS (Apple Silicon) | `.dmg` |',
                '| macOS (Intel) | `.dmg` |',
                '| Windows | `.msi` / `.exe` |',
                '| Linux | `.deb` / `.AppImage` |',
                '',
                '### 🍎 macOS 安装说明',
                '下载 `.dmg` 后拖入 Applications，首次打开前运行：',
                '```bash',
                'sudo xattr -rd com.apple.quarantine /Applications/EasyAIConfig.app',
                '```',
                '然后正常双击打开即可。',
                '',
                '### 更新日志',
                '- 修复 Windows 下部分启动命令的路径/引号兼容问题（Codex / Claude Code / OpenClaw）。',
                '- README 增加三平台下载指引与已支持功能/Roadmap 展示，信息更直观。',
                '- OpenClaw Dashboard 的 Provider 列表改为真实配置展示，移除占位假数据。',
                '- 文档视觉更新为简约风格（含新的扁平化 Logo）。',
              ].join('\n'),
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            updater_platform: darwin-aarch64
            artifact_name: updater-darwin-aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            updater_platform: darwin-x86_64
            artifact_name: updater-darwin-x86_64
          - platform: windows-latest
            args: ''
            rust_target: ''
            updater_platform: windows-x86_64
            artifact_name: updater-windows-x86_64
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
            updater_platform: linux-x86_64
            artifact_name: updater-linux-x86_64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare updater endpoint
        shell: bash
        run: |
          base='${{ secrets.CF_R2_PUBLIC_BASE_URL }}'
          base="${base%/}"
          if [ -n "$base" ]; then
            echo "EASYAICONFIG_UPDATER_ENDPOINT=$base/latest.json" >> "$GITHUB_ENV"
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          EASYAICONFIG_UPDATER_ENDPOINT: ${{ env.EASYAICONFIG_UPDATER_ENDPOINT }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Collect updater bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/updater
          case '${{ matrix.updater_platform }}' in
            darwin-aarch64)
              asset=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -type f -name '*.app.tar.gz' | head -n 1)
              ;;
            darwin-x86_64)
              asset=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -type f -name '*.app.tar.gz' | head -n 1)
              ;;
            windows-x86_64)
              asset=$(find src-tauri/target/release/bundle/msi -type f -name '*.msi' | head -n 1)
              if [ -z "${asset:-}" ]; then
                asset=$(find src-tauri/target/release/bundle/nsis -type f -name '*.exe' | head -n 1)
              fi
              ;;
            linux-x86_64)
              asset=$(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage' | head -n 1)
              ;;
            *)
              echo 'unsupported updater platform'
              exit 1
              ;;
          esac
          test -n "${asset:-}"
          sig="${asset}.sig"
          test -f "$sig"
          asset_name=$(basename "$asset")
          # Rename macOS updater bundles to include arch suffix so that
          # aarch64 and x86_64 don't collide when artifacts are merged.
          # Without this, both produce "EasyAIConfig.app.tar.gz" and one
          # overwrites the other in R2, causing signature verification failure.
          case '${{ matrix.updater_platform }}' in
            darwin-aarch64)
              renamed="${asset_name%.app.tar.gz}_aarch64.app.tar.gz"
              cp "$asset" "dist/updater/${renamed}"
              cp "$sig" "dist/updater/${renamed}.sig"
              asset_name="$renamed"
              ;;
            darwin-x86_64)
              renamed="${asset_name%.app.tar.gz}_x64.app.tar.gz"
              cp "$asset" "dist/updater/${renamed}"
              cp "$sig" "dist/updater/${renamed}.sig"
              asset_name="$renamed"
              ;;
            *)
              cp "$asset" dist/updater/
              cp "$sig" dist/updater/
              ;;
          esac
          signature=$(tr -d '\r' < "$sig" | head -n 1)
          jq -n \
            --arg platform '${{ matrix.updater_platform }}' \
            --arg asset "$asset_name" \
            --arg signature "$signature" \
            '{platform:$platform,asset:$asset,signature:$signature}' \
            > "dist/updater/${{ matrix.updater_platform }}.manifest.json"
          ls -lah dist/updater

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/updater/*
          if-no-files-found: error

  publish-r2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-release, build-tauri]
    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_PUBLIC_BASE_URL: ${{ secrets.CF_R2_PUBLIC_BASE_URL }}
      CF_R2_ENDPOINT: https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check R2 settings
        id: r2
        shell: bash
        run: |
          missing=0
          for key in CF_R2_ACCOUNT_ID CF_R2_ACCESS_KEY_ID CF_R2_SECRET_ACCESS_KEY CF_R2_BUCKET CF_R2_PUBLIC_BASE_URL; do
            if [ -z "${!key}" ]; then
              echo "missing: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Skip R2 upload
        if: steps.r2.outputs.enabled != 'true'
        run: echo 'Cloudflare R2 secrets 未配置，跳过国内更新源同步。'

      - name: Install tools
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download updater artifacts
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist/r2
          pattern: updater-*
          merge-multiple: true

      - name: Build latest.json for R2
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import datetime
          import glob
          import json
          import os
          from pathlib import Path

          base = os.environ['CF_R2_PUBLIC_BASE_URL'].rstrip('/')
          version = os.environ['RELEASE_TAG'].lstrip('v')
          manifests = []
          for manifest_path in sorted(glob.glob('dist/r2/*.manifest.json')):
              with open(manifest_path, 'r', encoding='utf-8') as handle:
                  manifests.append(json.load(handle))
          if not manifests:
              raise SystemExit('no updater manifests found')

          latest = {
              'version': version,
              'notes': '',
              'pub_date': datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'platforms': {},
          }
          for item in manifests:
              latest['platforms'][item['platform']] = {
                  'signature': item['signature'],
                  'url': f"{base}/{item['asset']}",
              }
          Path('dist/r2/latest.json').write_text(json.dumps(latest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          cat dist/r2/latest.json

      - name: Upload assets to R2
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync dist/r2 "s3://${CF_R2_BUCKET}/" \
            --endpoint-url "${CF_R2_ENDPOINT}" \
            --exclude '*.manifest.json' \
            --exclude 'latest.json' \
            --delete
          aws s3 cp dist/r2/latest.json "s3://${CF_R2_BUCKET}/latest.json" \
            --endpoint-url "${CF_R2_ENDPOINT}" \
            --cache-control 'no-store, no-cache, must-revalidate, max-age=0' \
            --content-type 'application/json'
          echo "R2 updater endpoint: ${CF_R2_PUBLIC_BASE_URL%/}/latest.json"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri, publish-r2]
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
